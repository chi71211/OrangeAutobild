# ============================================================
# GitHub Actions Workflow 配置檔案
# 檔案名稱：.github/workflows/autobild.yml
# 功能：自動排程執行 AutoBild 爬蟲並支援中斷續傳 (Commit 儲存)
# ============================================================

name: AutoBild Scraper

# ============================================================
# 觸發條件設定
# ============================================================
on:
  # 1. 推送程式碼時觸發 (修正：應填寫分支名稱，例如 main 或 master)
  push:
    branches: [ autobild_github.py ]

  # 2. 手動觸發
  workflow_dispatch:
    inputs:
      target_brand:
        description: '指定品牌（留空則爬全部）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - VW
          - BMW
          - Mercedes
          - Audi
          - Porsche
      force_full_scan:
        description: '強制全面掃描（忽略7天檢查）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ============================================================
# 工作任務設定
# ============================================================
jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # 🌟 關鍵新增：必須賦予 GitHub Actions 寫入儲存庫的權限，才能存檔
    permissions:
      contents: write 

    timeout-minutes: 360  # 6 小時

    steps:
    # 步驟 1：下載程式碼與上次存檔的資料庫 ( Checkout 會一併把 Repo 裡的 .db 載下來)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 步驟 2：設定 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 步驟 3：安裝所有依賴套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps

    # 步驟 4：執行爬蟲
    - name: Run scraper
      run: |
        export PYTHONUNBUFFERED=1
        
        BRAND_ARG=""
        if [ -n "${{ github.event.inputs.target_brand }}" ]; then
          BRAND_ARG="--brand ${{ github.event.inputs.target_brand }}"
        fi
        
        if [ "${{ github.event.inputs.force_full_scan }}" = "true" ]; then
          echo "Force full scan mode"
          python autobild_github.py $BRAND_ARG --reset
        else
          echo "Normal mode (7-day check)"
          python autobild_github.py $BRAND_ARG
        fi
      timeout-minutes: 345  # 5.5 小時

    # 🌟 步驟 5：將進度 Commit 並 Push 回 GitHub 儲存庫 (取代原本的下載 Artifact)
    - name: Commit and Push progress
      if: always() # 終極防護：無論成功、失敗還是被 Cancel，都強制執行
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-save database and CSV progress (Run ${{ github.run_number }})"
        file_pattern: "*.db AutoBild_Exports/*.csv"

    # 步驟 6：依然保留 CSV Artifact 上傳，方便您在網頁上直接打包下載
    - name: Upload CSV files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: autobild-csv-${{ github.run_number }}
        path: AutoBild_Exports/*.csv
        retention-days: 30
