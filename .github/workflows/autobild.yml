# ============================================================
# GitHub Actions Workflow 配置檔案
# 檔案名稱：.github/workflows/autobild.yml
# 功能：自動排程執行 AutoBild 爬蟲
# ============================================================

# Workflow 名稱（顯示在 GitHub Actions 頁面）
name: AutoBild Scraper

# ============================================================
# 觸發條件設定
# ============================================================
on:
  # 1. 推送程式碼時觸發（主要觸發條件）
  push:
    branches: [ main ]

  # 2. 手動觸發（在 GitHub 網頁介面上按按鈕）
  workflow_dispatch:
    inputs:
      target_brand:
        description: '指定品牌（留空則爬全部）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - VW
          - BMW
          - Mercedes
          - Audi
          - Porsche
      force_full_scan:
        description: '強制全面掃描（忽略7天檢查）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ============================================================
# 工作任務設定
# ============================================================
jobs:
  scrape:
    runs-on: ubuntu-latest
    
    # 超時限制（分鐘）
    timeout-minutes: 360  # 6 小時

    steps:
    # 步驟 1：下載程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 步驟 2：設定 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 步驟 3：下載上次的資料庫（如果有）
    - name: Download previous database
      uses: dawidd6/action-download-artifact@v2
      with:
        name: autobild-db-latest
        path: .
        if_no_artifact_found: warn
      continue-on-error: true

    # 步驟 4：安裝所有依賴套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps

    # 步驟 5：執行爬蟲
    - name: Run scraper
      run: |
        # 設定環境變數
        export PYTHONUNBUFFERED=1
        
        # 如果有指定品牌參數
        BRAND_ARG=""
        if [ -n "${{ github.event.inputs.target_brand }}" ]; then
          BRAND_ARG="--brand ${{ github.event.inputs.target_brand }}"
        fi
        
        # 如果強制全面掃描
        if [ "${{ github.event.inputs.force_full_scan }}" = "true" ]; then
          echo "Force full scan mode"
          python autobild_github.py $BRAND_ARG --reset
        else
          echo "Normal mode (7-day check)"
          python autobild_github.py $BRAND_ARG
        fi
      timeout-minutes: 330  # 5.5 小時

    # 步驟 6：上傳 CSV 檔案
    - name: Upload CSV files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: autobild-csv-${{ github.run_number }}
        path: AutoBild_Exports/*.csv
        retention-days: 30

    # 步驟 7：上傳資料庫（最新版本）
    - name: Upload database
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: autobild-db-latest
        path: autobild_master.db
        retention-days: 365

    # 步驟 8：上傳帶編號的資料庫（歷史記錄）
    - name: Upload database with run number
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: autobild-db-${{ github.run_number }}
        path: autobild_master.db
        retention-days: 30

    # 步驟 9：上傳進度記錄
    - name: Upload progress log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: autobild-progress-${{ github.run_number }}
        path: |
          autobild_master.db
          AutoBild_Exports/
        retention-days: 30
